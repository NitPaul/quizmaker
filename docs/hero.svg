<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="QuizMaker — Turn study material into quizzes in seconds">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#334155" stroke-opacity="0.25" stroke-width="1">
    <line x1="0"   y1="120" x2="1200" y2="120"/>
    <line x1="0"   y1="240" x2="1200" y2="240"/>
    <line x1="0"   y1="360" x2="1200" y2="360"/>
    <line x1="300" y1="0"   x2="300"  y2="480"/>
    <line x1="600" y1="0"   x2="600"  y2="480"/>
    <line x1="900" y1="0"   x2="900"  y2="480"/>
  </g>

  <!-- title -->
  <text x="60" y="120" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#title)" filter="url(#glow)">QuizMaker</text>
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">Turn study material into quizzes in seconds.</text>

  <!-- feature cards -->
  <g transform="translate(60,220)">
    <rect width="340" height="210" rx="20" fill="url(#card1)" opacity="0.95"/>
    <text x="24" y="44" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">CSV / XLSX</text>
    <text x="24" y="92" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Instant quizzes</text>
    <text x="24" y="124" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">from spreadsheets</text>
    <text x="24" y="174" font-family="Inter, sans-serif" font-size="13" fill="#e0e7ff">Client-side parsing • SheetJS</text>
  </g>

  <g transform="translate(420,220)">
    <rect width="340" height="210" rx="20" fill="url(#card2)" opacity="0.95"/>
    <text x="24" y="44" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">AI · GROQ + GEMINI</text>
    <text x="24" y="92" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Generate MCQs</text>
    <text x="24" y="124" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">from any text</text>
    <text x="24" y="174" font-family="Inter, sans-serif" font-size="13" fill="#f3e8ff">Provider abstraction • async Celery</text>
  </g>

  <g transform="translate(780,220)">
    <rect width="340" height="210" rx="20" fill="url(#card3)" opacity="0.95"/>
    <text x="24" y="44" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">RAG · PGVECTOR</text>
    <text x="24" y="92" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Grounded quizzes</text>
    <text x="24" y="124" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">from your PDFs</text>
    <text x="24" y="174" font-family="Inter, sans-serif" font-size="13" fill="#d1fae5">768-dim embeddings • HNSW</text>
  </g>
</svg>
