<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Home page preview">
  <rect width="800" height="500" fill="#f8fafc"/>
  <!-- top nav -->
  <rect x="0" y="0" width="800" height="56" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="24" y="34" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#6366f1">QuizMaker</text>
  <text x="600" y="34" font-family="Inter,sans-serif" font-size="12" fill="#475569">Home</text>
  <text x="640" y="34" font-family="Inter,sans-serif" font-size="12" fill="#475569">Library</text>
  <text x="690" y="34" font-family="Inter,sans-serif" font-size="12" fill="#475569">History</text>
  <text x="740" y="34" font-family="Inter,sans-serif" font-size="12" fill="#475569">Profile</text>
  <!-- hero -->
  <text x="40" y="110" font-family="Inter,sans-serif" font-size="28" font-weight="800" fill="#0f172a">What do you want to study today?</text>
  <text x="40" y="138" font-family="Inter,sans-serif" font-size="13" fill="#64748b">Pick a source and get a quiz in seconds.</text>
  <!-- three source cards -->
  <g transform="translate(40,170)">
    <rect width="230" height="250" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="230" height="6" rx="3" fill="#6366f1"/>
    <rect x="20" y="28" width="40" height="40" rx="10" fill="#eef2ff"/>
    <text x="40" y="55" font-family="Inter,sans-serif" font-size="20" fill="#6366f1" text-anchor="middle">📊</text>
    <text x="20" y="100" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#0f172a">CSV / XLSX</text>
    <text x="20" y="124" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Upload a spreadsheet of</text>
    <text x="20" y="140" font-family="Inter,sans-serif" font-size="12" fill="#64748b">questions and start now.</text>
    <rect x="20" y="200" width="190" height="36" rx="8" fill="#6366f1"/>
    <text x="115" y="223" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Upload spreadsheet</text>
  </g>
  <g transform="translate(285,170)">
    <rect width="230" height="250" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="230" height="6" rx="3" fill="#d946ef"/>
    <rect x="20" y="28" width="40" height="40" rx="10" fill="#fae8ff"/>
    <text x="40" y="55" font-family="Inter,sans-serif" font-size="20" fill="#d946ef" text-anchor="middle">✨</text>
    <text x="20" y="100" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#0f172a">AI from text</text>
    <text x="20" y="124" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Paste any content. Groq</text>
    <text x="20" y="140" font-family="Inter,sans-serif" font-size="12" fill="#64748b">or Gemini does the rest.</text>
    <rect x="20" y="200" width="190" height="36" rx="8" fill="#d946ef"/>
    <text x="115" y="223" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Paste text</text>
  </g>
  <g transform="translate(530,170)">
    <rect width="230" height="250" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="230" height="6" rx="3" fill="#10b981"/>
    <rect x="20" y="28" width="40" height="40" rx="10" fill="#d1fae5"/>
    <text x="40" y="55" font-family="Inter,sans-serif" font-size="20" fill="#10b981" text-anchor="middle">📄</text>
    <text x="20" y="100" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#0f172a">RAG over PDFs</text>
    <text x="20" y="124" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Upload a PDF once. Get</text>
    <text x="20" y="140" font-family="Inter,sans-serif" font-size="12" fill="#64748b">grounded MCQs with cites.</text>
    <rect x="20" y="200" width="190" height="36" rx="8" fill="#10b981"/>
    <text x="115" y="223" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Choose document</text>
  </g>
  <!-- stat row -->
  <g transform="translate(40,445)">
    <text font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">3 sources</text>
    <text x="90" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">2 modes</text>
    <text x="160" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">JWT auth</text>
    <text x="240" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">pgvector RAG</text>
  </g>
</svg>
