<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Login page preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- left form -->
  <rect x="60" y="100" width="280" height="300" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="140" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#0f172a">Welcome back</text>
  <text x="80" y="165" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Sign in to continue</text>
  <rect x="80" y="185" width="240" height="40" rx="8" fill="#f1f5f9"/>
  <text x="96" y="210" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8">email@example.com</text>
  <rect x="80" y="240" width="240" height="40" rx="8" fill="#f1f5f9"/>
  <text x="96" y="265" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8">••••••••</text>
  <rect x="80" y="300" width="240" height="42" rx="10" fill="#6366f1"/>
  <text x="200" y="327" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Sign in</text>
  <!-- right marketing -->
  <text x="380" y="70" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#6366f1" letter-spacing="2">QUIZMAKER</text>
  <text x="380" y="120" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="url(#title)">Turn study material</text>
  <text x="380" y="158" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="url(#title)">into quizzes.</text>
  <text x="380" y="195" font-family="Inter,sans-serif" font-size="13" fill="#475569">Upload CSVs, paste notes, or drop PDFs.</text>
  <!-- features -->
  <g transform="translate(380,225)">
    <rect width="4" height="36" rx="2" fill="#6366f1"/>
    <text x="16" y="14" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Instant Quiz from CSV/XLSX</text>
    <rect x="135" y="2" width="78" height="20" rx="10" fill="#10b981"/>
    <text x="174" y="16" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Available now</text>
    <text x="16" y="32" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Drop a spreadsheet, start studying.</text>
  </g>
  <g transform="translate(380,285)">
    <rect width="4" height="36" rx="2" fill="#d946ef"/>
    <text x="16" y="14" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0f172a">AI-generated quizzes from text</text>
    <rect x="158" y="2" width="78" height="20" rx="10" fill="#10b981"/>
    <text x="197" y="16" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Available now</text>
    <text x="16" y="32" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Groq or Gemini writes MCQs for you.</text>
  </g>
  <g transform="translate(380,345)">
    <rect width="4" height="36" rx="2" fill="#10b981"/>
    <text x="16" y="14" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0f172a">RAG over your PDFs</text>
    <rect x="100" y="2" width="78" height="20" rx="10" fill="#10b981"/>
    <text x="139" y="16" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Available now</text>
    <text x="16" y="32" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Source-cited via pgvector cosine search.</text>
  </g>
</svg>
