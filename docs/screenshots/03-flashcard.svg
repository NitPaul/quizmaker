<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Flashcard mode preview">
  <rect width="800" height="500" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Inter,sans-serif" font-size="14" fill="#64748b">Flashcard mode</text>
  <text x="40" y="78" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#0f172a">Question 3 of 10</text>
  <!-- progress -->
  <rect x="40" y="98" width="720" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="40" y="98" width="216" height="6" rx="3" fill="#6366f1"/>
  <!-- card -->
  <rect x="120" y="140" width="560" height="240" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="200" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="3" text-anchor="middle">QUESTION</text>
  <text x="400" y="245" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">Which Postgres extension</text>
  <text x="400" y="278" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">enables vector similarity search?</text>
  <text x="400" y="335" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Tap to reveal answer • or click an option below</text>
  <!-- options -->
  <g transform="translate(120,400)">
    <rect width="130" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="65" y="28" font-family="Inter,sans-serif" font-size="13" fill="#334155" text-anchor="middle">pg_trgm</text>
  </g>
  <g transform="translate(263,400)">
    <rect width="130" height="44" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="65" y="28" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">pgvector ✓</text>
  </g>
  <g transform="translate(406,400)">
    <rect width="130" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="65" y="28" font-family="Inter,sans-serif" font-size="13" fill="#334155" text-anchor="middle">hstore</text>
  </g>
  <g transform="translate(549,400)">
    <rect width="130" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="65" y="28" font-family="Inter,sans-serif" font-size="13" fill="#334155" text-anchor="middle">postgis</text>
  </g>
</svg>
