    <text x="62" y="50" font-family="Inter,sans-serif" font-size="11" fill="#64748b">42 chunks · 12 pages · ready</text>
    <rect x="300" y="22" width="48" height="20" rx="10" fill="#d1fae5"/>
    <text x="324" y="36" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">READY</text>
  </g>
  <g transform="translate(40,210)">
    <rect width="360" height="64" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="14" y="14" width="36" height="36" rx="8" fill="#f1f5f9"/>
    <text x="32" y="38" font-family="Inter,sans-serif" font-size="16" fill="#64748b" text-anchor="middle">📄</text>
    <text x="62" y="32" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Django REST primer.pdf</text>
    <text x="62" y="50" font-family="Inter,sans-serif" font-size="11" fill="#64748b">86 chunks · 28 pages · ready</text>
    <rect x="300" y="22" width="48" height="20" rx="10" fill="#d1fae5"/>
    <text x="324" y="36" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">READY</text>
  </g>
  <g transform="translate(40,280)">
    <rect width="360" height="64" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="14" y="14" width="36" height="36" rx="8" fill="#fef3c7"/>
    <text x="32" y="38" font-family="Inter,sans-serif" font-size="16" fill="#d97706" text-anchor="middle">📄</text>
    <text x="62" y="32" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Async Python patterns.pdf</text>
