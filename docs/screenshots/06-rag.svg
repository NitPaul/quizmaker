    <rect x="290" y="22" width="58" height="20" rx="10" fill="#fef3c7"/>
    <text x="319" y="36" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">INGESTING</text>
