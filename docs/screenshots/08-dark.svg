<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Dark mode preview">
  <defs>
    <linearGradient id="darkbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#darkbg)"/>
  <!-- nav -->
  <rect width="800" height="56" fill="#0f172a" stroke="#1e293b"/>
  <text x="24" y="34" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#a5b4fc">QuizMaker</text>
  <g transform="translate(720,18)">
    <circle cx="0" cy="10" r="14" fill="#1e293b"/>
    <text y="14" font-family="Inter,sans-serif" font-size="13" fill="#facc15" text-anchor="middle">🌙</text>
  </g>
  <!-- card -->
  <rect x="40" y="100" width="720" height="240" rx="20" fill="#111827" stroke="#1e293b"/>
  <text x="60" y="142" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#818cf8" letter-spacing="2">DARK MODE</text>
  <text x="60" y="180" font-family="Inter,sans-serif" font-size="26" font-weight="700" fill="#e5e7eb">Class-strategy Tailwind</text>
  <text x="60" y="212" font-family="Inter,sans-serif" font-size="14" fill="#94a3b8">System-preference detection on first load · persists in localStorage.</text>
  <g transform="translate(60,250)">
    <rect width="170" height="44" rx="10" fill="#6366f1"/>
    <text x="85" y="29" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Primary action</text>
    <rect x="190" y="0" width="170" height="44" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="275" y="29" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">Secondary</text>
  </g>
  <!-- stat cards -->
  <g transform="translate(40,360)">
    <rect width="226" height="100" rx="14" fill="#111827" stroke="#1e293b"/>
    <text x="20" y="36" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="2">QUIZZES TAKEN</text>
    <text x="20" y="78" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="#a5b4fc">42</text>
  </g>
  <g transform="translate(286,360)">
    <rect width="226" height="100" rx="14" fill="#111827" stroke="#1e293b"/>
    <text x="20" y="36" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="2">AVG SCORE</text>
    <text x="20" y="78" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="#34d399">87%</text>
  </g>
  <g transform="translate(532,360)">
    <rect width="228" height="100" rx="14" fill="#111827" stroke="#1e293b"/>
    <text x="20" y="36" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="2">DOCUMENTS</text>
    <text x="20" y="78" font-family="Inter,sans-serif" font-size="32" font-weight="800" fill="#f472b6">7</text>
  </g>
</svg>
