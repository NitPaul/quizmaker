<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="QuizMaker — Free AI Quiz Maker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- free badge -->
  <g transform="translate(80,90)">
    <rect width="150" height="44" rx="22" fill="#10b981"/>
    <text x="75" y="29" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#063" text-anchor="middle" letter-spacing="2">100% FREE</text>
  </g>

  <text x="80" y="250" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="url(#title)">QuizMaker</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="700" fill="#e2e8f0">Free AI Quiz Maker</text>
  <text x="80" y="378" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Turn PDFs, notes &amp; spreadsheets into quizzes in seconds.</text>

  <!-- source chips -->
  <g transform="translate(80,440)" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">
    <rect width="180" height="56" rx="28" fill="#312e81"/>
    <text x="90" y="36" fill="#c7d2fe" text-anchor="middle">CSV / XLSX</text>
    <rect x="200" width="220" height="56" rx="28" fill="#581c87"/>
    <text x="310" y="36" fill="#f0abfc" text-anchor="middle">AI from text</text>
    <rect x="440" width="220" height="56" rx="28" fill="#064e3b"/>
    <text x="550" y="36" fill="#6ee7b7" text-anchor="middle">RAG over PDFs</text>
  </g>

  <text x="80" y="585" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#64748b">Flashcards · Exam mode · Instant scoring · Dark mode</text>
</svg>
