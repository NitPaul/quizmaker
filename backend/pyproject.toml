[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "DJ"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/settings/*.py" = ["F405", "F401"]
"**/migrations/*.py" = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "quizmaker.settings.test"
python_files = ["test_*.py", "*_test.py", "tests.py"]
addopts = "-ra --tb=short"
